<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私たちの単語帳</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1>📖 私たちの単語帳</h1>
      <button id="settingsBtn" class="icon-btn" title="設定">⚙️</button>
    </div>

    <div class="tab-buttons">
      <button class="tab-btn active" data-tab="home">文章で学ぶ</button>
      <button class="tab-btn" data-tab="vocab">単語帳</button>
      <button class="tab-btn" data-tab="test">テスト</button>
    </div>

    <!-- ===================== ホーム（文章で学ぶ） ===================== -->
    <section id="homeTab" class="tab-content active">
      <p class="badge">今日の復習: <span id="dueCount">0</span> 件</p>

      <button id="newSentenceBtn" class="primary-btn">＋ 新しい文章を追加</button>

      <div id="sentenceForm" class="sentence-form" hidden>
        <textarea id="sourceInput" placeholder="原文（ウクライナ語）" rows="2"></textarea>
        <textarea id="targetInput" placeholder="翻訳（日本語・任意）" rows="2"></textarea>
        <input type="text" id="categoryInput" placeholder="カテゴリ（任意）" list="categoryList">
        <datalist id="categoryList"></datalist>

        <div class="form-actions">
          <button id="extractBtn" type="button">単語・フレーズを抽出</button>
          <button id="cancelSentenceBtn" type="button" class="ghost-btn">キャンセル</button>
        </div>

        <div id="extractResult" class="extract-result" hidden>
          <h4>フレーズ</h4>
          <p class="hint">タップで削除・分割できます</p>
          <div id="phraseChips" class="chip-list"></div>

          <h4>単語</h4>
          <p class="hint">複数選択して「フレーズ化」、タップで削除</p>
          <div id="wordChips" class="chip-list"></div>

          <div class="form-actions">
            <button id="phraseifyBtn" type="button">選択した単語をフレーズにする</button>
          </div>
          <div class="form-actions">
            <button id="saveSentenceBtn" type="button" class="primary-btn">この文章を保存</button>
          </div>
        </div>
      </div>

      <h3>最近学習した文章</h3>
      <ul id="recentSentences"></ul>
    </section>

    <!-- ===================== 単語帳 ===================== -->
    <section id="vocabTab" class="tab-content">
      <div class="filter-row">
        <input type="text" id="vocabSearch" placeholder="検索...">
        <input type="text" id="categoryFilter" placeholder="カテゴリ" list="categoryList">
      </div>
      <div class="filter-row">
        <select id="typeFilter">
          <option value="">単語＋フレーズ</option>
          <option value="word">単語のみ</option>
          <option value="phrase">フレーズのみ</option>
        </select>
        <label><input type="checkbox" id="untranslatedFilter"> 未翻訳のみ</label>
        <label><input type="checkbox" id="weakFilter"> 苦手のみ</label>
      </div>

      <div class="form-actions">
        <button id="mergeBtn" type="button">選択を結合してフレーズ化</button>
      </div>

      <ul id="vocabList"></ul>
    </section>

    <!-- ===================== テスト ===================== -->
    <section id="testTab" class="tab-content">
      <div class="test-setup" id="testSetup">
        <div class="form-row">
          <label>方向:</label>
          <select id="testDirection">
            <option value="ua-ja">ウクライナ語→日本語</option>
            <option value="ja-ua">日本語→ウクライナ語</option>
            <option value="random">ランダム</option>
          </select>
        </div>
        <div class="form-row">
          <label>形式:</label>
          <select id="testMode">
            <option value="input">入力式</option>
            <option value="choice">選択式</option>
            <option value="card">カード反転式</option>
          </select>
        </div>
        <div class="form-row">
          <label>対象:</label>
          <select id="testTypeScope">
            <option value="">単語＋フレーズ</option>
            <option value="word">単語のみ</option>
            <option value="phrase">フレーズのみ</option>
          </select>
        </div>
        <div class="form-row">
          <label>範囲:</label>
          <select id="testScope">
            <option value="all">全件</option>
            <option value="weak">苦手のみ</option>
            <option value="due">復習期限のみ</option>
          </select>
        </div>
        <button id="startTestBtn">テスト開始</button>
      </div>

      <div id="testArea" class="test-area" hidden>
        <p class="test-progress" id="testProgress"></p>
        <div class="test-question" id="testQuestion"></div>

        <form id="testInputForm" class="test-input-form" hidden>
          <input type="text" id="testAnswerInput" placeholder="答えを入力" autocomplete="off">
          <button type="submit">解答</button>
        </form>

        <div id="testChoices" class="test-choices" hidden></div>

        <div id="testCard" class="flashcard" hidden>
          <div class="flashcard-inner" id="testCardInner">
            <div class="flashcard-face flashcard-front" id="testCardFront"></div>
            <div class="flashcard-face flashcard-back" id="testCardBack"></div>
          </div>
        </div>
        <div id="testCardButtons" class="rating-buttons" hidden>
          <button class="rating-btn again" data-rating="again">覚えていない</button>
          <button class="rating-btn hard" data-rating="hard">まだ不安</button>
          <button class="rating-btn good" data-rating="good">覚えた</button>
        </div>

        <div id="testFeedback" class="test-feedback" hidden></div>
        <button id="nextQuestionBtn" hidden>次へ</button>
      </div>

      <div id="testResult" class="test-result" hidden></div>
    </section>

    <!-- ===================== 設定モーダル ===================== -->
    <div id="settingsModal" class="modal" hidden>
      <div class="modal-content">
        <button id="closeSettingsBtn" class="modal-close">×</button>
        <h3>学習統計</h3>
        <ul class="stats-list" id="statsList"></ul>

        <h3>データ管理</h3>
        <div class="settings-actions">
          <button id="exportBtn">Export JSON</button>
          <label class="import-label">
            Import JSON
            <input type="file" id="importFile" accept="application/json" hidden>
          </label>
        </div>
        <p class="hint">エクスポートしたファイルを保管しておくと、別の端末やブラウザでもデータを復元できます。</p>
      </div>
    </div>

    <!-- 単語タップ用パネル -->
    <div id="wordPanel" class="word-panel" hidden>
      <button class="word-panel-close" id="wordPanelClose">×</button>
      <div class="word-panel-content" id="wordPanelContent"></div>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
