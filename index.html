<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私たちの単語帳</title>
<link rel="stylesheet" href="style.css?v=1.0.13">
</head>
<body>
  <div class="app">
    <div class="topbar">
      <h1 data-i18n="appTitle">📖 私たちの単語帳</h1>
      <button id="settingsBtn" class="icon-btn" data-i18n-title="settingsTitle" title="設定">⚙️</button>
    </div>

    <div class="tab-buttons">
      <button class="tab-btn active" data-tab="home" data-i18n="tabHome">文章で学ぶ</button>
      <button class="tab-btn" data-tab="vocab" data-i18n="tabVocab">単語帳</button>
      <button class="tab-btn" data-tab="test" data-i18n="tabTest">テスト</button>
    </div>

    <!-- ===================== ホーム（文章で学ぶ） ===================== -->
    <section id="homeTab" class="tab-content active">
      <p class="badge"><span data-i18n="dueLabel">今日の復習:</span> <span id="dueCount">0</span> <span data-i18n="dueSuffix">件</span></p>

      <button id="newSentenceBtn" class="primary-btn" data-i18n="addSentenceBtn">＋ 新しい文章を追加</button>

      <div id="sentenceForm" class="sentence-form" hidden>
        <textarea id="sourceInput" data-i18n-placeholder="sourcePlaceholder" placeholder="原文（ウクライナ語）" rows="2"></textarea>
        <textarea id="targetInput" data-i18n-placeholder="targetPlaceholder" placeholder="翻訳（日本語・任意）" rows="2"></textarea>
        <select id="categoryInput">
          <option value="greeting" data-i18n="catGreeting">挨拶</option>
          <option value="daily" data-i18n="catDaily">日常会話</option>
          <option value="study" data-i18n="catStudy">大学・仕事</option>
          <option value="travel" data-i18n="catTravel">旅行</option>
          <option value="shopping" data-i18n="catShopping">買い物・食事</option>
          <option value="other" data-i18n="catOther">その他</option>
        </select>

        <div class="form-actions">
          <button id="extractBtn" type="button" data-i18n="extractBtn">単語を抽出</button>
          <button id="cancelSentenceBtn" type="button" class="ghost-btn" data-i18n="cancelBtn">キャンセル</button>
        </div>

        <div id="extractResult" class="extract-result" hidden>
          <h4 data-i18n="extractedWordsHeading">抽出された単語</h4>
          <p class="hint" data-i18n="extractHint">タップで削除できます</p>
          <div id="wordChips" class="chip-list"></div>

          <div class="form-actions">
            <button id="saveSentenceBtn" type="button" class="primary-btn" data-i18n="saveSentenceBtn">この文章を保存</button>
          </div>
        </div>
      </div>

      <h3 data-i18n="sentencesHeading">文章一覧</h3>
      <div class="filter-row">
        <label data-i18n="viewLabel">表示</label>
        <select id="sentenceViewFilter">
          <option value="all" data-i18n="viewAll">すべて</option>
          <option value="recent" data-i18n="viewRecent">最近</option>
        </select>
        <label data-i18n="categoryLabel">カテゴリ</label>
        <select id="sentenceCategoryFilter">
          <option value="all" data-i18n="filterAll">全て</option>
          <option value="greeting" data-i18n="catGreeting">挨拶</option>
          <option value="daily" data-i18n="catDaily">日常会話</option>
          <option value="study" data-i18n="catStudy">大学・仕事</option>
          <option value="travel" data-i18n="catTravel">旅行</option>
          <option value="shopping" data-i18n="catShopping">買い物・食事</option>
          <option value="other" data-i18n="catOther">その他</option>
        </select>
      </div>
      <ul id="recentSentences"></ul>
    </section>

    <!-- ===================== 単語帳 ===================== -->
    <section id="vocabTab" class="tab-content">
      <p class="hint" id="vocabDebugCount"></p>
      <div class="filter-row">
        <input type="text" id="vocabSearch" data-i18n-placeholder="searchPlaceholder" placeholder="検索...">
        <label><input type="checkbox" id="weakFilter"> <span data-i18n="weakOnlyLabel">苦手のみ</span></label>
      </div>

      <ul id="vocabList"></ul>
    </section>

    <!-- ===================== テスト ===================== -->
    <section id="testTab" class="tab-content">
      <div class="test-setup" id="testSetup">
        <div class="form-row">
          <label data-i18n="directionLabel">方向:</label>
          <select id="testDirection">
            <option value="ua-ja" data-i18n="dirUaJa">ウクライナ語→日本語</option>
            <option value="ja-ua" data-i18n="dirJaUa">日本語→ウクライナ語</option>
            <option value="random" data-i18n="dirRandom">ランダム</option>
          </select>
        </div>
        <div class="form-row">
          <label data-i18n="modeLabel">形式:</label>
          <select id="testMode">
            <option value="input" data-i18n="modeInput">入力式</option>
            <option value="choice" data-i18n="modeChoice">選択式</option>
            <option value="card" data-i18n="modeCard">カード反転式</option>
          </select>
        </div>
        <div class="form-row">
          <label data-i18n="scopeLabel">範囲:</label>
          <select id="testScope">
            <option value="all" data-i18n="scopeAll">全件</option>
            <option value="weak" data-i18n="scopeWeak">苦手のみ</option>
            <option value="due" data-i18n="scopeDue">復習期限のみ</option>
          </select>
        </div>
        <div class="form-row">
          <label data-i18n="categoryLabel">カテゴリ:</label>
          <select id="testCategory">
            <option value="all" data-i18n="filterAllCategories">全カテゴリ</option>
            <option value="greeting" data-i18n="catGreeting">挨拶</option>
            <option value="daily" data-i18n="catDaily">日常会話</option>
            <option value="study" data-i18n="catStudy">大学・仕事</option>
            <option value="travel" data-i18n="catTravel">旅行</option>
            <option value="shopping" data-i18n="catShopping">買い物・食事</option>
            <option value="other" data-i18n="catOther">その他</option>
          </select>
        </div>
        <button id="startTestBtn" data-i18n="startTestBtn">テスト開始</button>
      </div>

      <div id="testArea" class="test-area" hidden>
        <p class="test-progress" id="testProgress"></p>
        <div class="test-question" id="testQuestion"></div>

        <form id="testInputForm" class="test-input-form" hidden>
          <input type="text" id="testAnswerInput" data-i18n-placeholder="answerPlaceholder" placeholder="答えを入力" autocomplete="off">
          <button type="submit" data-i18n="submitBtn">解答</button>
        </form>

        <div id="testChoices" class="test-choices" hidden></div>

        <div id="testCard" class="flashcard" hidden>
          <div class="flashcard-inner" id="testCardInner">
            <div class="flashcard-face flashcard-front" id="testCardFront"></div>
            <div class="flashcard-face flashcard-back" id="testCardBack"></div>
          </div>
        </div>
        <div id="testCardButtons" class="rating-buttons" hidden>
          <button class="rating-btn again" data-rating="again" data-i18n="ratingAgain">覚えていない</button>
          <button class="rating-btn hard" data-rating="hard" data-i18n="ratingHard">まだ不安</button>
          <button class="rating-btn good" data-rating="good" data-i18n="ratingGood">覚えた</button>
        </div>

        <div id="testFeedback" class="test-feedback" hidden></div>
        <button id="nextQuestionBtn" hidden data-i18n="nextBtn">次へ</button>
      </div>

      <div id="testResult" class="test-result" hidden></div>
    </section>

    <!-- ===================== 設定モーダル ===================== -->
    <div id="settingsModal" class="modal" hidden>
      <div class="modal-content">
        <button id="closeSettingsBtn" class="modal-close">×</button>

        <h3 data-i18n="settingsTitle">設定</h3>
        <div class="form-row">
          <label data-i18n="languageLabel">言語</label>
          <select id="languageSelect">
            <option value="ja">日本語</option>
            <option value="en">English</option>
            <option value="uk">Українська</option>
          </select>
        </div>

        <h3 data-i18n="statsHeading">学習統計</h3>
        <ul class="stats-list" id="statsList"></ul>

        <h3 data-i18n="dataManagementHeading">データ管理</h3>
        <div class="settings-actions">
          <button id="exportBtn" data-i18n="exportBtn">JSONエクスポート</button>
          <label class="import-label">
            <span data-i18n="importLabel">JSONインポート</span>
            <input type="file" id="importFile" accept="application/json" hidden>
          </label>
        </div>
        <p class="hint" data-i18n="exportHint">エクスポートしたファイルを保管しておくと、別の端末やブラウザでもデータを復元できます。</p>
        <p class="hint" id="appVersion"></p>
      </div>
    </div>
  </div>

  <script type="module" src="js/main.js?v=1.0.13"></script>
</body>
</html>
